version: '3.8'

services:
  api:
    build:
      context: ./minimal-net-api
      dockerfile: Dockerfile
      target: build # Target the build stage which has the SDK
      no_cache: true
    ports:
      - "8080:8080"
    volumes:
      - ./minimal-net-api:/src # Mount source code to the build stage's WORKDIR
    # Override the command to use dotnet watch for hot reload
    command: dotnet watch run --project ./test.csproj --urls "http://0.0.0.0:8080"
    environment:
      - ASPNETCORE_HTTP_PORTS=8080
      - DOTNET_WATCH_SUPPRESS_LAUNCH_BROWSER=1
      - ConnectionStrings__DefaultConnection=Server=db;Database=master;User Id=sa;Password=StrongPassword123!;TrustServerCertificate=True;
      - Kafka__BootstrapServers=kafka:29092
      - DOTNET_USE_POLLING_FILE_WATCHER=1 # For file watching in Docker
    depends_on:
      - db
      - kafka

  db:
    image: mcr.microsoft.com/azure-sql-edge
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=StrongPassword123!
    volumes:
      - sql_data:/var/opt/mssql

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8081:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092
      - KAFKA_CLUSTERS_0_ZOOKEEPER=zookeeper:2181
    depends_on:
      - kafka

  fastapi_service:
    build:
      context: ./fastapi_service
      dockerfile: Dockerfile
      no_cache: true
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - SQL_SERVER_CONN=mssql+pymssql://sa:StrongPassword123!@db/master
      - POSTGRES_CONN=postgresql+psycopg2://postgres:postgres@postgres/postgres
    depends_on:
      - db
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      no_cache: true
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - HOSTNAME=0.0.0.0
    env_file:
      - ./frontend/.env.local

  elasticsearch:
    image: elasticsearch:8.11.1
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"

  kibana:
    image: kibana:8.11.1
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres

volumes:
  sql_data: